<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lara's Pomodoro</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>

<div class="container">

<div class="mainLayout">

<div class="timer">

<svg width="260" height="260">
<circle class="bg" cx="130" cy="130" r="120"/>
<circle class="progress" cx="130" cy="130" r="120"/>
</svg>

<div class="time" id="time">25:00</div>

<div class="subtitle" id="mode">stay focused</div>

</div>

<div class="image">
<img id="panda" src="img/focus.png">
</div>

</div>


<div class="buttons">

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="openPopup()">Set</button>

</div>

</div>



<!-- SESSION POPUP -->

<div id="sessionPopup" class="popup">

<div class="popupContent">

<h2>Create your study flow</h2>

<div class="popupButtons">

<button class="focusBtn" onclick="addSession('focus')">
Add Focus
</button>

<button class="relaxBtn" onclick="addSession('relax')">
Add Relax
</button>

<button class="clearBtn" onclick="clearSessions()">
Clear All
</button>

<button class="okBtn" onclick="saveSessions()">
Ok!
</button>

</div>

<div id="sessionMap" class="sessionMap"></div>

</div>

</div>


<audio id="focusMusic" src="audio/Focus.mp3" loop></audio>
<audio id="relaxMusic" src="audio/Relaxing.mp3" loop></audio>

<script src="js/script.js"></script>

</body>

</html>
